spring:
  datasource:
    url: jdbc:h2:mem:apitestdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  flyway:
    enabled: false

jwt:
  secret: test_jwt_secret_key_minimum_256_bits_long_for_hs256_testing
  expiration: 3600000

app:
  notification:
    default-reminder-minutes: 10
    missed-checkin-minutes: 5
  search:
    max-results: 50
    autocomplete-max: 10
  scheduler:
    reminder-interval-ms: 3600000
    missed-checkin-interval-ms: 3600000
    queue-interval-ms: 3600000
    escalation-cron: "0 0 * * * *"
