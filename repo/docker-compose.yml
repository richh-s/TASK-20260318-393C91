services:
  postgres:
    image: postgres:16-alpine
    container_name: citybus-postgres
    environment:
      POSTGRES_DB: citybus
      POSTGRES_USER: citybus
      POSTGRES_PASSWORD: citybus_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U citybus -d citybus"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: citybus-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/citybus?stringtype=unspecified
      SPRING_DATASOURCE_USERNAME: citybus
      SPRING_DATASOURCE_PASSWORD: citybus_pass
      JWT_SECRET: citybus_jwt_secret_key_minimum_256_bits_long_for_hs256
      JWT_EXPIRATION: 86400000
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: citybus-frontend
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "3000:80"

volumes:
  postgres_data:
