server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: citybus-platform
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/citybus?stringtype=unspecified}
    username: ${SPRING_DATASOURCE_USERNAME:citybus}
    password: ${SPRING_DATASOURCE_PASSWORD:citybus_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

jwt:
  secret: ${JWT_SECRET:citybus_jwt_secret_key_minimum_256_bits_long_for_hs256}
  expiration: ${JWT_EXPIRATION:86400000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [traceId=%X{traceId}] %-5level %logger{36} - %msg%n"
  level:
    com.citybus: INFO
    org.springframework.security: WARN

app:
  notification:
    default-reminder-minutes: 10
    missed-checkin-minutes: 5
    queue-backlog-threshold: 100
    api-p95-threshold-ms: 500
  search:
    max-results: 50
    autocomplete-max: 10
